<!DOCTYPE html>
<html>
<head>
    <style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: #fff;
        padding: 30px;
    }

    h2 {
        margin-bottom: 10px;
        font-weight: 600;
    }

    h3 {
        margin-top: 30px;
        opacity: 0.8;
    }

    form {
        margin-bottom: 15px;
    }

    input[type="text"] {
        padding: 10px;
        border-radius: 6px;
        border: none;
        outline: none;
        width: 250px;
        font-size: 14px;
    }

    .job {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        margin: 10px 0;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        backdrop-filter: blur(10px);
        transition: 0.3s;
    }

    .job:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.08);
    }

    .job span {
        font-size: 16px;
    }

    button {
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        transition: 0.2s;
    }

    .add-btn {
        background: #00c853;
        color: white;
    }

    .add-btn:hover {
        background: #00e676;
    }

    .edit-btn {
        background: #2979ff;
        color: white;
    }

    .edit-btn:hover {
        background: #5393ff;
    }

    .edit-submit-btn {
        background: #ffab00;
        color: black;
    }

    .edit-submit-btn:hover {
        background: #ffc400;
    }

    .delete-btn {
        background: #d50000;
        color: white;
    }

    .delete-btn:hover {
        background: #ff1744;
    }

    .edit-form input {
        margin-right: 5px;    
        }
        
    .exit-btn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
}

.exit-btn:hover {
    background: #9e9e9e;
}
</style>
</head>
<body>
    <h2>{{ role.capitalize() }}</h2>
    <form action="{{ url_for('logout') }}" method="POST">
    <button type="submit" class="exit-btn">Exit</button>
</form>

    {% if role in ['administrator', 'manager'] %}
    <form method="POST">
        <input type="text" name="job_title" placeholder="Job title" required>
        <button type="submit" name="action" value="add" class="add-btn">Add Job</button>
    </form>
    {% endif %}

    <h3>Jobs:</h3>

    {% for job in jobs %}
    <div class="job">
    <span>{{ loop.index }}. {{ job }}</span>

    <div style="display: flex; gap: 5px;">

        {% if role in ['administrator', 'manager'] %}
        <form method="POST" class="edit-form">
            <input type="hidden" name="job_index" value="{{ loop.index0 }}">
            <input type="text" name="job_title" placeholder="New title" required style="display:none;">
            <button type="button" class="edit-btn">Edit</button>
            <button type="submit" name="action" value="edit" class="edit-submit-btn" style="display:none;">Save</button>
        </form>
        {% endif %}

        {% if role == 'administrator' %}
        <form method="POST">
            <input type="hidden" name="job_index" value="{{ loop.index0 }}">
            <button type="submit" name="action" value="delete" class="delete-btn">Delete</button>
        </form>
        {% endif %}

    </div>
</div>
    {% endfor %}

<script>
document.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const form = btn.closest('.edit-form');
        const input = form.querySelector('input[name="job_title"]');
        const submitBtn = form.querySelector('.edit-submit-btn');
        if (input.style.display === 'none') {
            input.style.display = 'inline-block';
            submitBtn.style.display = 'inline-block';
        } else {
            input.style.display = 'none';
            submitBtn.style.display = 'none';
        }
    });
});
</script>

</body>
</html>
